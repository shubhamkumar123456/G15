<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


        .main {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #top{
            width: 700px;
            height: 80px;
            background-color: aqua;
        }

        .footer{
            width: 700px;
            height: 80px;
            background-color: aqua;
            margin-top: 20px;
        }

        .a{
            width: 150px;
            height: 400px;
            background-color: black;
        }
        .b{
            width: 150px;
            height: 400px;
            background-color: blueviolet;
        }

        .c{
            height: 400px;
            width: 360px;
            background-color: yellow;
            display: flex;
            justify-content:center ;
            align-items: center;
            
        }


        .box{
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    
    <div id="top" class="top"></div>

    <div class="box">
        <div class="a main"></div>
        <div class="b main"></div>
        <div class="c main">
            <p>Message</p>
        </div>
    </div>

    <div class="footer main">
        <p>Footer</p>
    </div>

    
</body>
</html>
