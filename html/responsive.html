<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1{
            background-color: aqua;
            font-size: 60px;
        }

        .container{
            width: 100%;
            height: 500px;
            background-color: violet;
            display: flex;
            /* flex-direction: row; */
            gap: 20px;
            padding:30px ;
        }
        .box{
            width: 50%;
            height: 100%;
            background-color: brown;
        }

        @media only screen and (max-width:800px){
            h1{
                background-color: orange;
                font-size: 40px;
            }
            .container{
                flex-direction: column;
                height: 800px;
            }
            .box{
                width: 100%;
            }
        }


        @media only screen and (max-width:350px){
            h1{
                background-color: tomato;
                font-size: 25px;
            }
        }
    </style>
</head>
<body>
    <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iste, culpa.</h1>


    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>
</body>
</html>
